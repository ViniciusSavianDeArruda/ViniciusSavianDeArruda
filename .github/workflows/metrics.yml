name: Gerar Metrics

on:
  schedule:
    # Roda uma vez por dia (meia-noite UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token pessoal (PAT) salvo nos secrets do repositório
          token: ${{ secrets.METRICS_TOKEN }}
          # Arquivo gerado (o README aponta pra ./github-metrics.svg)
          filename: github-metrics.svg
          # Tema
          template: classic
          base: header, activity, community, repositories, metadata

          # Calendário isométrico de contribuições
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Linguagens mais usadas
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Hábitos: horários que você mais commita, etc.
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Linha do tempo de atividade recente
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
