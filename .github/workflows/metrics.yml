name: Gerar Metrics

on:
  schedule:
    # Roda uma vez por dia (meia-noite UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token pessoal (PAT) salvo nos secrets do repositório
          token: ${{ secrets.METRICS_TOKEN }}
          # Arquivo gerado (o README aponta pra ./github-metrics.svg)
          filename: github-metrics.svg

          # Aparência geral
          template: classic
          config_timezone: America/Sao_Paulo
          config_animations: yes
          config_padding: 6%

          # Blocos exibidos (enxuto: só o essencial)
          base: header

          # Calendario isometrico de contribuicoes (o destaque visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Linguagens mais usadas (Jupyter Notebook ignorado pra nao distorcer)
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: jupyter-notebook
